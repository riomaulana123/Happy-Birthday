<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Sakura Blossom Wedding - leafitation.style</title>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500&family=Sacramento&display=swap" rel="stylesheet">
  
  <!-- Swiper -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  
  <style>
    /* ===== RESET & VARIABLES ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --sakura-primary: #FFB7C5;
      --sakura-secondary: #FF8A9C;
      --sakura-light: #FFE4E9;
      --sakura-white: #FFF9FB;
      --sakura-gold: #E8C39E;
      --sakura-brown: #8B5A2B;
      --sakura-green: #A8BF8B;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--sakura-white);
      color: #4A4A4A;
      overflow-x: hidden;
    }

    /* ===== DESKTOP FIXED COVER ===== */
    #desk_cov {
      position: fixed;
      left: 0;
      top: 0;
      width: calc(100% - 500px);
      height: 100vh;
      background: linear-gradient(145deg, var(--sakura-primary), var(--sakura-light));
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px;
      z-index: 10;
      overflow: hidden;
    }

    #desk_cov::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.1"><path d="M50 20 Q70 0 90 20 Q100 40 80 60 Q50 80 30 60 Q0 40 20 20 Q30 0 50 20" fill="%23FF8A9C"/></svg>');
      background-size: 100px;
      pointer-events: none;
    }

    #desk_cov h2 {
      font-family: 'Sacramento', cursive;
      font-size: 4rem;
      color: white;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
      margin-bottom: 20px;
      position: relative;
      z-index: 2;
    }

    #desk_cov .names {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.5rem;
      color: var(--sakura-brown);
      border-top: 2px solid var(--sakura-gold);
      border-bottom: 2px solid var(--sakura-gold);
      padding: 20px 0;
      margin: 20px 0;
      position: relative;
      z-index: 2;
    }

    #desk_cov .date {
      font-size: 1.5rem;
      color: white;
      position: relative;
      z-index: 2;
    }

    /* ===== MAIN CONTENT ===== */
    #isi {
      margin-left: calc(100% - 500px);
      width: 500px;
      background: var(--sakura-white);
      position: relative;
      z-index: 20;
      box-shadow: -5px 0 30px rgba(0,0,0,0.1);
    }

    /* ===== SAKURA PARTICLES ===== */
    .sakura-particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .petal {
      position: absolute;
      background: var(--sakura-primary);
      width: 15px;
      height: 15px;
      border-radius: 150% 0 150% 0;
      opacity: 0.4;
      animation: fall linear infinite;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh) rotate(720deg);
      }
    }

    /* ===== COVER MOBILE ===== */
    #ajaib-cover {
      min-height: 100vh;
      background: linear-gradient(145deg, var(--sakura-primary), var(--sakura-light));
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    #ajaib-cover .content {
      position: relative;
      z-index: 2;
      max-width: 400px;
    }

    #ajaib-cover h2 {
      font-family: 'Sacramento', cursive;
      font-size: 3rem;
      color: white;
      margin-bottom: 20px;
    }

    #ajaib-cover .names {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      color: var(--sakura-brown);
      margin: 20px 0;
    }

    #ajaib-cover .to {
      color: white;
      margin-bottom: 10px;
    }

    #ajaib-cover .btn-open {
      background: transparent;
      border: 2px solid white;
      color: white;
      padding: 12px 40px;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
      border-radius: 50px;
      margin-top: 30px;
    }

    #ajaib-cover .btn-open:hover {
      background: white;
      color: var(--sakura-primary);
    }

    /* ===== VIDEO SECTION ===== */
    .video-section {
      position: relative;
      min-height: 60vh;
      overflow: hidden;
    }

    .video-background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    .video-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 183, 197, 0.3);
      z-index: 0;
    }

    .video-content {
      position: relative;
      z-index: 2;
      color: white;
      text-align: center;
      padding: 100px 20px;
    }

    .video-content h1 {
      font-family: 'Sacramento', cursive;
      font-size: 4rem;
      margin-bottom: 20px;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
    }

    /* ===== ORNAMENT BUNGA ===== */
    .sakura-ornament-left,
    .sakura-ornament-right {
      position: absolute;
      width: 150px;
      height: auto;
      opacity: 0.5;
      pointer-events: none;
      z-index: 5;
    }

    .sakura-ornament-left {
      left: 0;
      top: 50%;
      transform: translateY(-50%);
    }

    .sakura-ornament-right {
      right: 0;
      top: 50%;
      transform: translateY(-50%) scaleX(-1);
    }

    /* ===== AYAT SECTION ===== */
    .ayat-section {
      padding: 60px 20px;
      background: var(--sakura-light);
      text-align: center;
      position: relative;
    }

    .ayat-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      max-width: 600px;
      margin: 0 auto;
      color: var(--sakura-brown);
    }

    /* ===== COUPLE SECTION ===== */
    .couple-section {
      padding: 60px 20px;
      text-align: center;
    }

    .section-title {
      text-align: center;
      margin-bottom: 40px;
    }

    .section-title .main {
      font-family: 'Sacramento', cursive;
      font-size: 3rem;
      color: var(--sakura-primary);
    }

    .section-title .sub {
      color: var(--sakura-brown);
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 0.9rem;
    }

    .couple-grid {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
    }

    .couple-card {
      flex: 1;
      min-width: 200px;
    }

    .photo-frame {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      overflow: hidden;
      margin: 0 auto 20px;
      border: 5px solid var(--sakura-gold);
      box-shadow: 0 10px 20px rgba(255, 183, 197, 0.3);
    }

    .photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .couple-card h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      color: var(--sakura-brown);
    }

    .instagram-btn {
      display: inline-block;
      margin-top: 15px;
      padding: 8px 25px;
      background: var(--sakura-primary);
      color: white;
      border-radius: 50px;
      text-decoration: none;
      font-size: 0.9rem;
      transition: 0.3s;
    }

    .instagram-btn:hover {
      background: var(--sakura-secondary);
    }
